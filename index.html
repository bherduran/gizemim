<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G & B — Aşkımızın Puzzle ı</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --crimson: #8B0000;
    --crimson-light: #C41E3A;
    --gold: #CFB53B;
    --gold-light: #FFD700;
    --gold-pale: #FFF8DC;
    --cream: #FAF0E6;
    --dark: #1a0a00;
    --dark2: #2d1200;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  /* Animated background */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #3d0a00 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #2a1000 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #1a0800 0%, #0d0400 100%);
  }

  /* Floating particles */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* Ornament lines */
  .ornament {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fade-in 1s ease forwards 0.3s;
  }
  .ornament-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* Initials */
  .initials {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--crimson-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(30px);
    animation: rise-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
    text-shadow: none;
    filter: drop-shadow(0 0 40px rgba(207, 181, 59, 0.3));
  }

  .ampersand {
    font-style: italic;
    font-size: 0.7em;
    opacity: 0.8;
  }

  /* Subtitle */
  .subtitle {
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-style: italic;
    color: var(--gold-pale);
    opacity: 0;
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
    animation: fade-in 1s ease forwards 1s;
  }

  /* Heart divider */
  .heart-row {
    display: flex;
    gap: 0.5rem;
    margin: 2.5rem 0;
    opacity: 0;
    animation: fade-in 1s ease forwards 1.2s;
  }
  .heart {
    color: var(--crimson-light);
    font-size: 1.2rem;
    animation: pulse-heart 2s ease-in-out infinite;
  }
  .heart:nth-child(2) { animation-delay: 0.3s; color: var(--gold); font-size: 1.5rem; }
  .heart:nth-child(3) { animation-delay: 0.6s; }
  @keyframes pulse-heart {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* Main message */
  .message {
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 300;
    line-height: 1.8;
    color: var(--cream);
    max-width: 600px;
    opacity: 0;
    animation: fade-in 1s ease forwards 1.4s;
    margin-bottom: 3rem;
  }
  .message em {
    color: var(--gold-light);
    font-style: italic;
  }

  /* Buttons */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
    opacity: 0;
    animation: fade-in 1s ease forwards 1.8s;
  }

  .btn {
    position: relative;
    padding: 1rem 3rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-light) 100%);
    color: var(--gold-light);
    border: 1px solid var(--gold);
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:hover { color: var(--dark); transform: translateY(-3px); box-shadow: 0 10px 40px rgba(207,181,59,0.3); }
  .btn-primary span { position: relative; z-index: 1; }

  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(207,181,59,0.4);
    font-size: 0.95rem;
  }
  .btn-secondary:hover {
    border-color: var(--gold);
    background: rgba(207,181,59,0.1);
    transform: translateY(-2px);
  }

  /* Bottom ornament */
  .bottom-ornament {
    margin-top: 4rem;
    opacity: 0;
    animation: fade-in 1s ease forwards 2.2s;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: rgba(207,181,59,0.4);
    text-transform: uppercase;
  }

  /* Animations */
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes rise-in {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    opacity: 0.3;
    z-index: 5;
  }
  .corner-tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  /* Nav */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    gap: 3rem;
    padding: 1.5rem;
    background: linear-gradient(to bottom, rgba(26,8,0,0.8), transparent);
  }
  nav a {
    color: rgba(207,181,59,0.6);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  nav a:hover { color: var(--gold-light); }

  @media (max-width: 480px) {
    .ornament-line { width: 40px; }
    .buttons { width: 100%; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Nav -->
<nav>
  <a href="index.html">Ana Sayfa</a>
  <a href="puzzle.html">Puzzle</a>
  <a href="gallery.html">Galeri</a>
</nav>

<!-- Main content -->
<div class="container">
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line"></div>
  </div>

  <div class="initials">G <span class="ampersand">&</span> B</div>
  <div class="subtitle">Ay Parçam Aşk Parçamm</div>

  <div class="heart-row">
    <span class="heart">♥</span>
    <span class="heart">♥</span>
    <span class="heart">♥</span>
  </div>

  <p class="message">
    Her fotoğraf bir an.<br>
    Sense en güzel anımsın her zamanımsın.<br>
    <em>Aşkımızın parçalarını birleştir güzelimm.</em>
  </p>

  <div class="buttons">
    <a href="puzzle.html" class="btn btn-primary"><span>✦ Oyyna bakalımm ✦</span></a>
    <a href="gallery.html" class="btn btn-secondary">Galerimize bakk</a>
  </div>

  <div class="bottom-ornament">seni · çok · seviyorum</div>
</div>

<script>
// Generate floating particles
const container = document.getElementById('particles');
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 1;
  p.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${Math.random() * 100}%;
    animation-duration: ${Math.random() * 15 + 10}s;
    animation-delay: ${Math.random() * 10}s;
    opacity: ${Math.random() * 0.5};
  `;
  container.appendChild(p);
}
</script>
</body>
</html>
