<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G & B — Our Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --crimson: #8B0000;
    --crimson-light: #C41E3A;
    --gold: #CFB53B;
    --gold-light: #FFD700;
    --cream: #FAF0E6;
    --dark: #1a0a00;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, #3d0a00 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #2a1000 0%, transparent 60%), #0d0400;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 2rem;
    background: rgba(13,4,0,0.9);
    border-bottom: 1px solid rgba(207,181,59,0.2);
  }
  nav a { color: rgba(207,181,59,0.7); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.15em; transition: color 0.3s; }
  nav a:hover { color: var(--gold-light); }
  .nav-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); }

  .content { position: relative; z-index: 10; padding-top: 80px; }

  /* Hero */
  .hero {
    text-align: center;
    padding: 4rem 2rem 3rem;
  }
  .hero-label {
    font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(207,181,59,0.5); margin-bottom: 1rem;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--crimson-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
  }
  .hero-sub {
    font-style: italic; color: rgba(250,240,230,0.6);
    font-size: 1.1rem; letter-spacing: 0.1em;
  }

  /* Ornament */
  .ornament {
    display: flex; align-items: center; gap: 1rem;
    justify-content: center; margin: 2rem 0;
  }
  .ornament-line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .ornament-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); }

  /* Gallery grid */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
    gap: 1.5rem;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1;
    background: rgba(207,181,59,0.05);
    border: 1px solid rgba(207,181,59,0.15);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .gallery-item:hover {
    border-color: rgba(207,181,59,0.5);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(207,181,59,0.1);
  }

  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.4s;
    filter: brightness(0.85) saturate(0.9);
  }
  .gallery-item:hover img {
    transform: scale(1.05);
    filter: brightness(1) saturate(1.1);
  }

  .gallery-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(13,4,0,0.8) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.4s;
    display: flex; align-items: flex-end;
    padding: 1.5rem;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }

  .gallery-label {
    font-style: italic;
    color: var(--gold-light);
    font-size: 1rem;
    letter-spacing: 0.05em;
  }

  /* Corner accent on hover */
  .gallery-item::before, .gallery-item::after {
    content: ''; position: absolute; z-index: 2;
    width: 20px; height: 20px;
    opacity: 0; transition: opacity 0.4s;
  }
  .gallery-item::before {
    top: 8px; left: 8px;
    border-top: 1px solid var(--gold);
    border-left: 1px solid var(--gold);
  }
  .gallery-item::after {
    bottom: 8px; right: 8px;
    border-bottom: 1px solid var(--gold);
    border-right: 1px solid var(--gold);
  }
  .gallery-item:hover::before, .gallery-item:hover::after { opacity: 1; }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.95);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
    padding: 2rem;
  }
  .lightbox.active { opacity: 1; pointer-events: all; }

  .lightbox-inner {
    position: relative;
    max-width: min(800px, 90vw);
    max-height: 85vh;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    transform: scale(0.9); transition: transform 0.4s;
  }
  .lightbox.active .lightbox-inner { transform: scale(1); }

  .lightbox img {
    max-width: 100%; max-height: 70vh;
    object-fit: contain;
    border: 1px solid rgba(207,181,59,0.3);
  }
  .lightbox-label {
    font-style: italic; color: var(--gold);
    font-size: 1.1rem; letter-spacing: 0.1em;
  }
  .lightbox-close {
    position: absolute; top: -2rem; right: 0;
    background: none; border: none;
    color: var(--gold); font-size: 1.5rem;
    cursor: pointer; opacity: 0.7; transition: opacity 0.3s;
  }
  .lightbox-close:hover { opacity: 1; }

  .lightbox-nav {
    display: flex; gap: 1rem;
  }
  .lightbox-nav button {
    padding: 0.6rem 1.5rem;
    background: transparent;
    border: 1px solid rgba(207,181,59,0.4);
    color: var(--gold);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    transition: all 0.3s;
  }
  .lightbox-nav button:hover {
    background: rgba(207,181,59,0.1);
    border-color: var(--gold);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 3rem 2rem;
    color: rgba(207,181,59,0.3);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .gallery { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; padding: 1rem; }
    nav { padding: 0.8rem 1rem; }
  }
</style>
</head>
<body>
<div class="bg"></div>

<nav>
  <a href="index.html">← Home</a>
  <span class="nav-title">G & B</span>
  <a href="puzzle.html">Puzzle →</a>
</nav>

<div class="content">
  <div class="hero">
    <div class="hero-label">our memories</div>
    <div class="hero-title">The Gallery</div>
    <div class="hero-sub">every photo, a moment I treasure</div>
  </div>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line"></div>
  </div>

  <div class="gallery" id="gallery"></div>

  <footer>made with love · G & B · always</footer>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-label" id="lightbox-label"></div>
    <div class="lightbox-nav">
      <button onclick="lightboxNav(-1)">← Prev</button>
      <button onclick="lightboxNav(1)">Next →</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ADD YOUR PHOTOS HERE
// Format: { src: 'photos/filename.jpg', label: 'Caption' }
// ============================================================
const PHOTOS = [
  { src: 'photos/photo1.jpg', label: 'Her şeyimmm' },
  { src: 'photos/photo2.jpg', label: 'İlk dateimizz' },
  { src: 'photos/photo3.jpg', label: 'Gülüşüne Öldüğümm' },
  // Add more photos here! Just copy and paste the lines above
];

let currentLightbox = 0;

// Build gallery
const gallery = document.getElementById('gallery');
PHOTOS.forEach((photo, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.innerHTML = `
    <img src="${photo.src}" alt="${photo.label}" loading="lazy">
    <div class="gallery-overlay">
      <span class="gallery-label">${photo.label}</span>
    </div>
  `;
  item.addEventListener('click', () => openLightbox(i));
  gallery.appendChild(item);

  // Animate in on scroll
  item.style.opacity = '0';
  item.style.transform = 'translateY(20px)';
  item.style.transition = `opacity 0.6s ease ${i * 0.1}s, transform 0.6s ease ${i * 0.1}s`;
  setTimeout(() => {
    item.style.opacity = '1';
    item.style.transform = 'translateY(0)';
  }, 100);
});

function openLightbox(i) {
  currentLightbox = i;
  document.getElementById('lightbox-img').src = PHOTOS[i].src;
  document.getElementById('lightbox-label').textContent = PHOTOS[i].label;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
}
function closeLightboxBtn() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  currentLightbox = (currentLightbox + dir + PHOTOS.length) % PHOTOS.length;
  openLightbox(currentLightbox);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightboxBtn();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});
</script>
</body>
</html>
